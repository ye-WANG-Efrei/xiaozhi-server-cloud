# 小智 ESP32 Server — 参数化全模块部署
# 使用方法：
#   cp .env.example .env    # 首次使用，复制并填写参数
#   docker compose -f docker-compose_deploy.yml up -d


services:

  # ----------------------------------------------------------
  # AI 服务器（Python，WebSocket + HTTP）
  # ----------------------------------------------------------
  xiaozhi-esp32-server:
    image: ghcr.nju.edu.cn/xinnan-tech/xiaozhi-esp32-server:server_latest
    container_name: xiaozhi-esp32-server
    restart: always
    depends_on:
      - xiaozhi-esp32-server-db
      - xiaozhi-esp32-server-redis
    networks:
      - default
    ports:
      - "${WS_PORT:-8000}:8000"
      - "${HTTP_PORT:-8003}:8003"
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      # 自定义配置（含 API Key 等敏感信息）
      - ./data:/opt/xiaozhi-esp32-server/data

  # ----------------------------------------------------------
  # 智控台（manager-api + manager-web，Spring Boot + Vue）
  # ----------------------------------------------------------
  xiaozhi-esp32-server-web:
    image: ghcr.nju.edu.cn/xinnan-tech/xiaozhi-esp32-server:web_latest
    container_name: xiaozhi-esp32-server-web
    restart: always
    networks:
      - default
    depends_on:
      xiaozhi-esp32-server-db:
        condition: service_healthy
      xiaozhi-esp32-server-redis:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8002}:8002"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SPRING_DATASOURCE_DRUID_URL=jdbc:mysql://xiaozhi-esp32-server-db:3306/${MYSQL_DATABASE:-xiaozhi_esp32_server}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
      - SPRING_DATASOURCE_DRUID_USERNAME=root
      - SPRING_DATASOURCE_DRUID_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_DATA_REDIS_HOST=xiaozhi-esp32-server-redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SPRING_DATA_REDIS_PORT=6379
    volumes:
      - ./uploadfile:/uploadfile

  # ----------------------------------------------------------
  # MySQL 数据库
  # ----------------------------------------------------------
  xiaozhi-esp32-server-db:
    image: mysql:latest
    container_name: xiaozhi-esp32-server-db
    restart: always
    networks:
      - default
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 45s
      interval: 10s
      retries: 10
    expose:
      - 3306
    volumes:
      - ./mysql/data:/var/lib/mysql
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-xiaozhi_esp32_server}
      - MYSQL_INITDB_ARGS=--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ----------------------------------------------------------
  # Redis 缓存
  # ----------------------------------------------------------
  xiaozhi-esp32-server-redis:
    image: redis:latest
    container_name: xiaozhi-esp32-server-redis
    restart: always
    networks:
      - default
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: >
      sh -c '
        if [ -n "${REDIS_PASSWORD}" ]; then
          redis-server --requirepass "${REDIS_PASSWORD}"
        else
          redis-server
        fi
      '

networks:
  default:
